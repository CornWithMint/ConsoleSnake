name: Build and Release Go Game

on:
  push:
    tags:
      - 'v*' # Запуск при создании тега, например, v1.0.0

permissions:
  contents: write # Необходимо для загрузки файлов в релиз

jobs:
  build:
    name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.2' # Укажите вашу версию Go

      - name: Build the game
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="Console-Snake-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$BINARY_NAME"

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v1
        with:
          files: "Console-Snake-*" # Загружает все файлы, начинающиеся с "my-game-"