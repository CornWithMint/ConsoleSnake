name: Build and Release Go Game

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.2'   # укажите вашу версию Go

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="Console-Snake-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$BINARY_NAME"
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV

      - name: Package for Unix (tar.gz)
        if: matrix.goos != 'windows'
        run: |
          chmod +x "${{ env.BINARY_NAME }}"
          tar -czvf "${{ env.BINARY_NAME }}.tar.gz" "${{ env.BINARY_NAME }}"
          echo "ASSET_NAME=${{ env.BINARY_NAME }}.tar.gz" >> $GITHUB_ENV

      - name: Package for Windows (just exe)
        if: matrix.goos == 'windows'
        run: |
          echo "ASSET_NAME=${{ env.BINARY_NAME }}" >> $GITHUB_ENV

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ASSET_NAME }}